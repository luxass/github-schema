name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

permissions: {}

jobs:
  ci:
    uses: luxass/shared-workflows/.github/workflows/reusable-ci.yaml@ce9e8e27eebe8940214594f75f503742a4db8150 # v0.6.0
    permissions:
      contents: read
    with:
      fmt: true
      fmt-script: "fmt:check"

name: Update GitHub GraphQL Schema

on:
  workflow_dispatch:
    inputs:
      dry-run:
        type: boolean
        description: Run the workflow without creating a pull request
        required: false
        default: false
  schedule:
    - cron: "0 0 * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    environment:
      name: huginn
      deployment: false
    if: github.repository == 'luxass/github-schema'
    steps:
      - name: generate token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          repositories: luxass/github-schema
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: pnpm

      - name: install dependencies
        run: pnpm install

      - name: download github graphql schema
        run: |
          echo "" > .env
          pnpm run schema:download
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: generate types
        run: pnpm run schema:codegen

      - name: lint with fix
        run: pnpm run lint --fix

      - name: generate diff
        id: generate-diff
        run: |
          git diff github-schema.graphql > github-schema.diff

          # if the diff is empty
          if [ ! -s github-schema.diff ]; then
            echo "No changes found in the GitHub GraphQL Schema."
            exit 0
          fi

          echo "Changes found in the GitHub GraphQL Schema:"
          {
            echo 'DIFF<<EOF'
            cat github-schema.diff
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: check if diff is too long
        id: diff-too-long
        run: |
          DIFF_LENGTH=$(wc -l < github-schema.diff)
          if [ "$DIFF_LENGTH" -gt 2000 ]; then
            echo "The diff is too long. Please check the file manually."
            echo "DIFF_TOO_LONG=true" >> "$GITHUB_OUTPUT"
          else
            echo "DIFF_TOO_LONG=false" >> "$GITHUB_OUTPUT"
          fi

      - name: generate pr metadata (ai)
        id: pr-metadata
        if: ${{ steps.generate-diff.outputs.DIFF != '' && github.event.inputs.dry-run != 'true' && steps.diff-too-long.outputs.DIFF_TOO_LONG == 'false' }}
        env:
          PR_METADATA_URL: ${{ vars.PR_METADATA_URL }}
          PR_METADATA_HMAC_SECRET: ${{ secrets.PR_METADATA_HMAC_SECRET }}
          PR_METADATA_CONTEXT: |
            This repository contains GitHub's GraphQL schema and generated TypeScript types.
            Prefer a GraphQL type or input name as the scope when there is a clear single target.

        run: |
          set -euo pipefail

          DIFF_CONTENT=$(cat github-schema.diff)

          REQUEST_JSON=$(jq -n \
            --arg repository "${{ github.repository }}" \
            --arg context "$PR_METADATA_CONTEXT" \
            --arg diff "$DIFF_CONTENT" \
            '{
              repository: $repository,
              context: $context,
              diff: $diff
            }')

          TIMESTAMP=$(( $(date +%s) * 1000 ))
          SIGNATURE=$(printf '%s' "${TIMESTAMP}.${REQUEST_JSON}" | openssl dgst -sha256 -hmac "$PR_METADATA_HMAC_SECRET" -hex | awk '{print $2}')

          RESPONSE=$(printf '%s' "$REQUEST_JSON" | curl -fsS -X POST "$PR_METADATA_URL" \
            -H "Content-Type: application/json" \
            -H "User-Agent: luxass/github-schema (+https://github.com/luxass/github-schema; workflow=update.yaml)" \
            -H "X-Timestamp: $TIMESTAMP" \
            -H "X-Signature: $SIGNATURE" \
            --data-binary @-)

          echo "API response: $RESPONSE"

          TYPE=$(echo "$RESPONSE" | jq -r '.type')
          SCOPE=$(echo "$RESPONSE" | jq -r '.scope')
          MESSAGE=$(echo "$RESPONSE" | jq -r '.message')
          BODY=$(echo "$RESPONSE" | jq -r '.body')
          TITLE="$TYPE${SCOPE:+($SCOPE)}: $MESSAGE"

          echo "✅ Generated PR title: $TITLE"
          {
            echo "title<<GITHUB_EOF"
            printf '%s' "$TITLE"
            echo
            echo "GITHUB_EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "body<<GITHUB_EOF"
            printf '%s' "$BODY"
            echo
            echo "GITHUB_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        if: ${{ github.event.inputs.dry-run != 'true' }}
        env:
          DIFF: ${{ steps.diff-too-long.outputs.DIFF_TOO_LONG == 'true' && 'diff is too long to render' || steps.generate-diff.outputs.DIFF }}
          PR_TITLE: "${{ steps.pr-metadata.outputs.title || 'feat: updated github graphql schema' }}"
          PR_BODY: ${{ steps.pr-metadata.outputs.body || 'I don''t know what they changed, but I''m sure it''s important.' }}
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: |
            ${{ env.PR_TITLE }}

            ${{ env.PR_BODY }}
          title: ${{ env.PR_TITLE }}
          body: |
            I found some new changes in GitHub's GraphQL Schema.

            ${{ env.PR_BODY }}

            ### Changes
            <details>
            <summary>Schema Changes</summary><br/>

            ```diff
            ${{ env.DIFF }}
            ```

            <br/></details>

            This is an automated PR to update the GitHub GraphQL Schema.
          branch: update-github-graphql-schema
          add-paths: github-schema.graphql,src/github-schema.ts
          base: main
          committer: huginn-watch[bot] <273299945+huginn-watch[bot]@users.noreply.github.com>
          author: huginn-watch[bot] <273299945+huginn-watch[bot]@users.noreply.github.com>
          reviewers: luxass

name: Update GitHub GraphQL Schema

on:
  workflow_dispatch:
    inputs:
      dry-run:
        type: boolean
        description: Run the workflow without creating a pull request
        required: false
        default: false
  schedule:
    - cron: "0 0 * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      models: read
    environment:
      name: huginn
      deployment: false
    if: github.repository == 'luxass/github-schema'
    steps:
      - name: generate token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: setup node
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: lts/*
          cache: pnpm

      - name: install dependencies
        run: pnpm install

      - name: download github graphql schema
        run: |
          echo "" > .env
          pnpm run schema:download
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: generate types
        run: pnpm run schema:codegen

      - name: lint with fix
        run: pnpm run lint --fix

      - name: generate diff
        id: generate-diff
        run: |
          git diff github-schema.graphql > github-schema.diff

          # if the diff is empty
          if [ ! -s github-schema.diff ]; then
            echo "No changes found in the GitHub GraphQL Schema."
            exit 0
          fi

          echo "Changes found in the GitHub GraphQL Schema:"
          {
            echo 'DIFF<<EOF'
            cat github-schema.diff
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: check if diff is too long
        id: diff-too-long
        run: |
          DIFF_LENGTH=$(wc -l < github-schema.diff)
          if [ "$DIFF_LENGTH" -gt 2000 ]; then
            echo "The diff is too long. Please check the file manually."
            echo "DIFF_TOO_LONG=true" >> "$GITHUB_OUTPUT"
          else
            echo "DIFF_TOO_LONG=false" >> "$GITHUB_OUTPUT"
          fi

      - name: generate pr metadata (ai)
        id: pr-metadata
        if: ${{ steps.generate-diff.outputs.DIFF != '' && github.event.inputs.dry-run != 'true' && steps.diff-too-long.outputs.DIFF_TOO_LONG == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYSTEM_PROMPT: |
            You generate conventional commit metadata for automated pull requests that sync changes from GitHub's GraphQL schema.

            You will receive a git diff of the GraphQL schema. Analyze it and return a JSON object with:
            - type: "docs" if only descriptions/comments changed, "feat" if fields/types/inputs were added, "fix" if something was corrected, "chore" for anything else.
            - scope: the GraphQL type or input name being changed. Empty string if multiple types changed.
            - message: a concise imperative-mood description under 72 characters.
            - body: a short markdown bullet list summarizing what changed.
          REQUEST_TEMPLATE: |
            {
              "messages": [
                { "role": "system", "content": "" },
                { "role": "user", "content": "" }
              ],
              "model": "xai/grok-3-mini",
              "reasoning_effort": "high",
              "response_format": {
                "type": "json_schema",
                "json_schema": {
                  "name": "pr-title",
                  "strict": true,
                  "schema": {
                    "type": "object",
                    "properties": {
                      "type": { "type": "string", "enum": ["docs", "feat", "fix", "chore"] },
                      "scope": { "type": "string" },
                      "message": { "type": "string" },
                      "body": { "type": "string" }
                    },
                    "additionalProperties": false,
                    "required": ["type", "scope", "message", "body"]
                  }
                }
              }
            }

        run: |
          set -euo pipefail

          DIFF_CONTENT=$(cat github-schema.diff)

          # Build the request JSON using jq to safely insert the prompt and diff into the REQUEST_TEMPLATE.
          REQUEST_JSON=$(jq --arg system "$SYSTEM_PROMPT" --arg diff "$DIFF_CONTENT" \
            '.messages[0].content=$system | .messages[1].content=("Please analyze this git diff and generate an appropriate PR title.\n\n```diff\n" + $diff + "\n```")' \
            <<< "$REQUEST_TEMPLATE")

          # Call the GitHub Models API via curl (pipe JSON via stdin to avoid shell quoting issues)
          RESPONSE=$(printf '%s' "$REQUEST_JSON" | curl -s -X POST "https://models.github.ai/inference/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            --data-binary @-)

          echo "API response: $RESPONSE"

          # Extract the generated JSON content and build the title
          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          TYPE=$(echo "$CONTENT" | jq -r '.type')
          SCOPE=$(echo "$CONTENT" | jq -r '.scope')
          MESSAGE=$(echo "$CONTENT" | jq -r '.message')
          BODY=$(echo "$CONTENT" | jq -r '.body')
          TITLE="$TYPE${SCOPE:+($SCOPE)}: $MESSAGE"

          echo "✅ Generated PR title: $TITLE"
          {
            echo "title<<GITHUB_EOF"
            printf '%s' "$TITLE"
            echo
            echo "GITHUB_EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "body<<GITHUB_EOF"
            printf '%s' "$BODY"
            echo
            echo "GITHUB_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: create pull request
        uses: peter-evans/create-pull-request@98357b18bf14b5342f975ff684046ec3b2a07725 # v8.0.0
        if: ${{ github.event.inputs.dry-run != 'true' }}
        env:
          DIFF: ${{ steps.diff-too-long.outputs.DIFF_TOO_LONG == 'true' && 'diff is too long to render' || steps.generate-diff.outputs.DIFF }}
          PR_TITLE: "${{ steps.pr-metadata.outputs.title || 'feat: updated github graphql schema' }}"
          PR_BODY: ${{ steps.pr-metadata.outputs.body || 'I don''t know what they changed, but I''m sure it''s important.' }}
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: |
            ${{ env.PR_TITLE }}

            ${{ env.PR_BODY }}
          title: ${{ env.PR_TITLE }}
          body: |
            I found some new changes in GitHub's GraphQL Schema.

            ${{ env.PR_BODY }}

            ### Changes
            <details>
            <summary>Schema Changes</summary><br/>

            ```diff
            ${{ env.DIFF }}
            ```

            <br/></details>

            This is an automated PR to update the GitHub GraphQL Schema.
          branch: update-github-graphql-schema
          add-paths: github-schema.graphql,src/github-schema.ts
          base: main
          committer: huginn-watch[bot] <273299945+huginn-watch[bot]@users.noreply.github.com>
          author: huginn-watch[bot] <273299945+huginn-watch[bot]@users.noreply.github.com>
          reviewers: luxass

name: GitHub Actions Security Analysis

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths:
      - ".github/workflows/**"
  push:
    branches:
      - main
      - "renovate/**"
    paths:
      - ".github/workflows/**"

permissions: {}

jobs:
  zizmor:
    uses: luxass/shared-workflows/.github/workflows/reusable-ci-security.yaml@70000dc85b43fa0b5e18a731330b7f95f4e1a7fc # v0.9.0
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    with:
      zizmor-version: v1.25.0

name: Auto Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - github-schema.graphql
      - src/github-schema.ts

jobs:
  auto-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    environment:
      name: huginn
      deployment: false
    if: |
      github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'update-github-graphql-schema'
      && github.repository == 'luxass/github-schema' && (github.event.pull_request.user.login == 'luxass' || github.event.pull_request.user.login == 'huginn-watch[bot]')
    steps:
      - name: generate token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          repositories: luxass/github-schema
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token }}

      - name: setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: install dependencies
        run: pnpm install

      - name: build
        run: pnpm run build

      - name: create tag and release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          IFS='.' read -r MAJOR MINOR PATCH <<< "$(jq -r '.version' package.json)"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          while IFS= read -r msg; do
            if [[ "$msg" =~ ^feat ]]; then
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
              break
            fi
          done < <(git log "$BASE_SHA..$HEAD_SHA" --format=%s)

          git config user.email "273299945+huginn-watch[bot]@users.noreply.github.com"
          git config user.name "huginn-watch[bot]"

          npx bumpp "$NEW_VERSION" --commit --tag --push --yes
